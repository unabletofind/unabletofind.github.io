<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swetha Devi | SOC Analyst · Threat Hunting (Cyber Premium)</title>
<meta name="description" content="Swetha Devi — SOC Analyst & Threat Hunter. Threat research, attack chains, detection rules, IR playbooks.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ===== YOUR EXISTING STYLES (PRESERVED) ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020b16;--surface:#071324;--surface2:#0c1c30;
  --accent:#00ffe5;--accent2:#3b82f6;--red:#f43f5e;
  --amber:#f59e0b;--green:#22c55e;--text:#e8f4ff;
  --muted:#5a7a9a;--border:rgba(0,255,229,0.08);
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 4px);pointer-events:none;z-index:1}
nav{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(2,11,22,0.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1240px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-shield{width:40px;height:40px;background:rgba(0,255,229,0.1);border:1px solid rgba(0,255,229,0.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);position:relative;overflow:hidden}
.logo-shield::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent 0deg,rgba(0,255,229,0.06) 60deg,transparent 120deg);animation:spin 6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-0.02em;color:var(--text)}
.logo-tag{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:-1px}
.nav-links{display:flex;gap:2px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;transition:.2s}
.nav-links a:hover{color:var(--accent);background:rgba(0,255,229,0.06)}
.nav-links a.active{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);padding:5px 12px;border-radius:100px}
.nav-sdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite}
.nav-cta{background:rgba(0,255,229,0.08);color:var(--accent);border:1px solid rgba(0,255,229,0.25);padding:8px 18px;border-radius:8px;font-weight:600;font-size:12px;text-decoration:none;transition:.2s;display:flex;align-items:center;gap:7px;font-family:var(--mono)}
.nav-cta:hover{background:rgba(0,255,229,0.15);transform:translateY(-1px)}
.container{max-width:1240px;margin:0 auto;padding:0 28px;position:relative;z-index:2}
section{padding:90px 0}
.hero{min-height:100vh;display:flex;align-items:center;padding-top:80px;position:relative;z-index:2}
.hero-content{max-width:820px}
.status-bar{display:inline-flex;align-items:center;gap:8px;background:rgba(0,255,229,0.04);border:1px solid rgba(0,255,229,0.15);padding:5px 14px;border-radius:100px;font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:32px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.4s infinite}
.hero-pretitle{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px}
.hero-title{font-size:clamp(2.6rem,5.5vw,4.2rem);font-weight:700;letter-spacing:-0.04em;line-height:1.05;margin-bottom:12px}
.hero-title .line1{display:block;color:var(--text)}
.hero-title .line2{display:block;-webkit-text-fill-color:transparent;-webkit-background-clip:text;background-clip:text;background-image:linear-gradient(90deg,var(--accent) 0%,var(--accent2) 100%)}
.typewriter-wrap{height:34px;margin:20px 0 26px;font-family:var(--mono);font-size:1rem;color:var(--accent2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.typewriter-prefix{color:var(--muted);font-size:.85rem}
#tw-text{font-weight:500}
.cursor{display:inline-block;width:2px;height:18px;background:var(--accent2);animation:blink 1s infinite;vertical-align:middle}
.hero-bio{font-size:.95rem;color:var(--muted);max-width:640px;line-height:1.75;margin-bottom:28px}
.hero-bio strong{color:var(--text);font-weight:500}
.badge-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:32px}
.badge{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);padding:4px 13px;border-radius:100px;font-size:11px;font-family:var(--mono);color:var(--muted);transition:.2s;cursor:default}
.badge:hover{border-color:rgba(0,255,229,0.3);color:var(--accent);background:rgba(0,255,229,0.04)}
.badge.cert{border-color:rgba(245,158,11,0.25);color:var(--amber);background:rgba(245,158,11,0.04)}
.hero-actions{display:flex;flex-wrap:wrap;gap:10px}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(255,255,255,0.1);padding:9px 18px;border-radius:9px;color:var(--text);text-decoration:none;font-size:13px;font-weight:500;transition:.25s}
.btn-ghost:hover{border-color:rgba(0,255,229,0.3);color:var(--accent);background:rgba(0,255,229,0.04);transform:translateY(-2px)}
.btn-solid{display:inline-flex;align-items:center;gap:8px;background:rgba(0,255,229,0.1);color:var(--accent);border:1px solid rgba(0,255,229,0.3);padding:9px 20px;border-radius:9px;font-size:13px;font-weight:700;text-decoration:none;transition:.25s}
.btn-solid:hover{background:rgba(0,255,229,0.18);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,255,229,0.1)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(0,255,229,0.06);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:52px}
.stat{background:var(--surface);padding:22px 18px;text-align:center;transition:.2s;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transition:.3s}
.stat:hover::before{transform:scaleX(1)}
.stat:hover{background:var(--surface2)}
.stat-num{font-size:1.9rem;font-weight:700;font-family:var(--mono);-webkit-text-fill-color:transparent;-webkit-background-clip:text;background-clip:text;background-image:linear-gradient(135deg,var(--accent),var(--accent2))}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;font-family:var(--mono)}
.sec-header{margin-bottom:44px;display:flex;align-items:flex-end;gap:20px}
.sec-meta{flex-shrink:0}
.sec-tag{font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.15em;margin-bottom:6px}
.sec-title{font-size:1.95rem;font-weight:700;letter-spacing:-0.03em}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);margin-bottom:6px}
.terminal{background:#000e1a;border:1px solid rgba(0,255,229,0.15);border-radius:16px;overflow:hidden;font-family:var(--mono)}
.term-bar{background:#000810;padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.term-dot{width:12px;height:12px;border-radius:50%}
.term-path{margin-left:auto;font-size:11px;color:var(--muted)}
.term-body{padding:24px;font-size:12.5px;line-height:2;min-height:300px}
.term-line{opacity:0;transform:translateX(-3px);animation:slide-in .25s forwards}
@keyframes slide-in{to{opacity:1;transform:none}}
.tc-green{color:var(--accent)}.tc-blue{color:var(--accent2)}.tc-yellow{color:var(--amber)}.tc-gray{color:var(--muted)}.tc-white{color:#fff}.tc-dim{color:#3a5a6a}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:20px}
.skill-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;transition:.3s;position:relative;overflow:hidden;cursor:pointer}
.skill-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:.3s}
.skill-card:hover::before{opacity:1}
.skill-card:hover{border-color:rgba(0,255,229,0.2);transform:translateY(-4px);background:var(--surface2)}
.skill-card-head{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.skill-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.skill-title{font-size:13px;font-weight:600;letter-spacing:0.01em}
.skill-bar-item{margin-bottom:14px}
.skill-bar-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px}
.skill-bar-name{color:var(--muted)}
.skill-bar-pct{color:var(--accent);font-family:var(--mono);font-weight:600}
.skill-bar-track{height:3px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.skill-bar-fill{height:100%;border-radius:3px;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1.3s cubic-bezier(.16,1,.3,1)}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:0;width:1px;background:linear-gradient(to bottom,var(--accent),rgba(0,255,229,0.05))}
.tl-item{position:relative;margin-bottom:32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;transition:.3s}
.tl-item:hover{border-color:rgba(0,255,229,0.2);background:var(--surface2)}
.tl-dot{position:absolute;left:-36px;top:30px;width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(0,255,229,0.12),0 0 14px rgba(0,255,229,0.3)}
.tl-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.tl-title{font-size:1.05rem;font-weight:600}
.tl-period{font-family:var(--mono);font-size:11px;color:var(--accent);background:rgba(0,255,229,0.07);border:1px solid rgba(0,255,229,0.15);padding:4px 12px;border-radius:100px;white-space:nowrap}
.tl-company{font-size:12px;color:var(--accent2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tl-body{font-size:13px;color:var(--muted);line-height:1.75}
.tl-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tl-tag{background:rgba(59,130,246,0.07);border:1px solid rgba(59,130,246,0.13);padding:3px 9px;border-radius:100px;font-size:10px;font-family:var(--mono);color:var(--accent2)}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:22px}
.blog-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;cursor:pointer;transition:.3s;display:flex;flex-direction:column;position:relative;overflow:hidden}
.blog-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transform:scaleX(0);transform-origin:left;transition:.35s ease}
.blog-card:hover::before{transform:scaleX(1)}
.blog-card:hover{border-color:rgba(0,255,229,0.15);transform:translateY(-6px);background:var(--surface2)}
.blog-cat-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;padding:4px 10px;border-radius:100px;border:1px solid}
.blog-title{font-size:1.05rem;font-weight:600;margin-bottom:10px;line-height:1.4}
.blog-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:12px;display:flex;align-items:center;gap:12px}
.blog-excerpt{font-size:13px;color:var(--muted);line-height:1.65;flex:1}
.blog-footer{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.blog-read{color:var(--accent);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);transition:.2s}
.blog-card:hover .blog-read{gap:10px}
.blog-tags{display:flex;gap:5px;flex-wrap:wrap}
.blog-tag{background:rgba(0,255,229,0.05);border:1px solid rgba(0,255,229,0.1);padding:2px 7px;border-radius:3px;font-size:9px;font-family:var(--mono);color:var(--accent)}
.read-time-badge{margin-left:8px;font-size:9px;background:rgba(0,0,0,0.4);padding:2px 6px;border-radius:20px;color:var(--accent);font-family:mono}
.view-all-wrap{text-align:center;margin-top:36px}
.btn-viewall{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(0,255,229,0.15);padding:10px 24px;border-radius:9px;color:var(--accent);text-decoration:none;font-size:12px;font-family:var(--mono);transition:.25s}
.btn-viewall:hover{background:rgba(0,255,229,0.06);border-color:rgba(0,255,229,0.3)}
.cert-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.cert-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 20px;display:flex;align-items:center;gap:14px;transition:.25s}
.cert-card:hover{border-color:rgba(0,255,229,0.2);background:var(--surface2)}
.cert-icon{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cert-name{font-weight:600;font-size:13px;margin-bottom:2px}
.cert-issuer{font-size:11px;color:var(--muted)}
.connect-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.connect-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:22px;text-align:center;transition:.3s;text-decoration:none;color:var(--text);display:block}
.connect-card:hover{border-color:rgba(0,255,229,0.2);transform:translateY(-4px);background:var(--surface2)}
.connect-icon{width:46px;height:46px;border-radius:11px;background:rgba(0,255,229,0.06);border:1px solid rgba(0,255,229,0.12);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--accent);margin:0 auto 14px}
.connect-name{font-weight:600;font-size:14px;margin-bottom:4px}
.connect-sub{font-size:11px;color:var(--muted)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,5,14,0.95);backdrop-filter:blur(20px);z-index:1000;overflow-y:auto;padding:40px 20px}
.modal-overlay.open{display:block}
.modal-box{max-width:880px;margin:0 auto;background:#010d1a;border:1px solid rgba(0,255,229,0.15);border-radius:20px;overflow:hidden;animation:modal-in .28s ease}
@keyframes modal-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.modal-top-bar{background:#000a14;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,255,229,0.06)}
.modal-path{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.modal-path span{color:var(--accent)}
.modal-close{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:var(--muted);font-size:18px;cursor:pointer;padding:4px 10px;transition:.2s;border-radius:6px;line-height:1}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,0.08)}
.modal-body{padding:38px}
.modal-body h2{font-size:1.65rem;font-weight:700;margin-bottom:8px;letter-spacing:-0.025em;line-height:1.2}
.modal-body h3{font-size:1rem;font-weight:600;color:var(--accent);margin:28px 0 10px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.modal-body h3::before{content:'//';color:rgba(0,255,229,0.3);font-size:.9rem}
.modal-body p{color:var(--muted);font-size:13.5px;line-height:1.85;margin-bottom:12px}
.modal-body pre{background:#000810;border:1px solid rgba(0,255,229,0.1);border-left:2px solid var(--accent);padding:20px;border-radius:10px;overflow-x:auto;font-size:11.5px;font-family:var(--mono);line-height:1.75;color:#7ac4b8;margin:16px 0}
.modal-body hr{border:none;border-top:1px solid rgba(0,255,229,0.06);margin:26px 0}
.modal-date{font-family:var(--mono);font-size:11px;color:var(--muted)}
.mitre-grid{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}
.mitre-tag{background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.15);padding:4px 11px;border-radius:5px;font-family:var(--mono);font-size:10px;color:var(--red)}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:none}
footer{border-top:1px solid var(--border);padding:28px 0;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);position:relative;z-index:2}
footer span{color:var(--accent)}
@media(max-width:768px){
  .nav-links,.nav-status{display:none}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .hero-title{font-size:2.2rem}
  .blog-grid{grid-template-columns:1fr}
}
.custom-cursor { width: 20px; height: 20px; border: 2px solid rgba(0, 255, 229, 0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease, width 0.2s, height 0.2s; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(0, 255, 229, 0.3);}
.cursor-dot { width: 4px; height: 4px; background: #00ffe5; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.05s ease; transform: translate(-50%, -50%); box-shadow: 0 0 8px #00ffe5;}
.page-transition { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--accent), var(--bg)); z-index: 9998; transform: scaleY(0); transform-origin: top; pointer-events: none; animation: modal-in 0.5s ease forwards;}

/* NEW PREMIUM STYLES */
#mouseGlow { position: fixed; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, rgba(0,255,229,0.12) 0%, rgba(0,255,229,0) 70%); pointer-events: none; z-index: 3; transform: translate(-50%, -50%); transition: transform 0.05s linear; will-change: transform; }
.ai-chat-bubble { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
.chat-btn { width: 55px; height: 55px; background: var(--surface); border: 1px solid var(--accent); border-radius: 30px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 24px; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,229,0.2); transition: .2s; backdrop-filter: blur(8px);}
.chat-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--accent);}
.ai-menu { position: absolute; bottom: 70px; right: 0; background: var(--surface2); border: 1px solid var(--accent); border-radius: 16px; width: 190px; padding: 8px 0; backdrop-filter: blur(12px); display: none; flex-direction: column; font-family: var(--mono);}
.ai-menu a { padding: 10px 16px; color: var(--text); text-decoration: none; font-size: 12px; transition: .1s; display: flex; align-items: center; gap: 10px; border-left: 2px solid transparent;}
.ai-menu a:hover { background: rgba(0,255,229,0.1); color: var(--accent); border-left-color: var(--accent);}
.system-widget { position: fixed; bottom: 30px; left: 30px; background: rgba(2,11,22,0.8); backdrop-filter: blur(16px); border: 1px solid var(--accent); border-radius: 16px; padding: 12px 18px; z-index: 100; font-family: var(--mono); font-size: 11px; width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); pointer-events: none;}
.system-header { color: var(--green); font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 6px;}
.clock { font-family: monospace; letter-spacing: 1px; color: var(--accent);}
.threat-feed { margin-top: 6px; border-top: 1px solid rgba(0,255,229,0.2); padding-top: 6px; font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.threat-feed span { color: var(--red);}

<script>

// 1. Parallax effect: background moves at different speed
window.addEventListener('scroll', () => {
  const scrolled = window.pageYOffset;
  document.querySelectorAll('.hero .bg-element').forEach(el => { if(el) el.style.transform = `translateY(${scrolled * 0.2}px)`; });
  const bgCanvas = document.getElementById('bgCanvas');
  if(bgCanvas) bgCanvas.style.transform = `translateY(${scrolled * 0.1}px)`;

});
// 2. Live System Status + Threat Feed
function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second:'2-digit' }); }
setInterval(updateClock, 1000); updateClock();
const threats = ["Suspicious PowerShell child process detected (T1059)", "Potential AiTM phishing campaign : 8 indicators", "MDE alert: LSASS access from unknown IP", "Entra ID anomalous token", "Phishing PDF observed in mailflow", "RDP brute-force attempt from TOR", "KQL rule matched: scheduled task persistence"];

setInterval(() => { threatIdx = (threatIdx+1)%threats.length; document.getElementById('threatFeed').innerHTML = `<i class="fas fa-bolt"></i> <span>${threats[threatIdx]}</span>`; }, 4500);

const toolsCycle = ["KQL Query Tuner", "MITRE ATT&CK Mapper", "Sentinel Playbook Designer", "Threat Hunter Toolkit"];

document.querySelectorAll('.skill-card').forEach(card => { card.addEventListener('mouseenter', (e) => { card.style.transform = 'translateY(-4px)'; setTimeout(() => { if(!card.matches(':hover')) card.style.transform = ''; }, 200); }); });

// 5. AI Assistant Menu
const aiBtn = document.getElementById('aiBtn'), aiMenu = document.getElementById('aiMenu');

startMatrixRain(); // dummy to not overload, actual rain logic simplified: toggle opacity
setInterval(() => { const matrixDiv = document.getElementById('matrixCanvas'); if(matrixDiv && Math.random()<0.2){ matrixDiv.style.opacity = '0.4'; setTimeout(()=> matrixDiv.style.opacity='0', 5000); } }, 15000);
// 7. Counters scrolled into view (Enhanced original stats)
const counterObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { if(entry.isIntersecting){ const el = entry.target; if(!el.classList.contains('counted')){ el.classList.add('counted'); const target = parseInt(el.dataset.count,10); let curr=0; const step = Math.ceil(target/35); const interval = setInterval(()=>{ curr+=step; if(curr>=target){ el.innerText = target+(el.dataset.suffix||''); clearInterval(interval); pulseStatNumbers(); } else el.innerText = curr+(el.dataset.suffix||''); }, 30); } } }); }, { threshold: 0.5 });
document.querySelectorAll('[data-count]').forEach(c => counterObserver.observe(c));
// 8. Live Terminal Accepting Commands (new interactive section)
const interactiveTerm = document.createElement('div');
interactiveTerm.className = 'terminal reveal'; interactiveTerm.style.marginTop = '40px';
interactiveTerm.innerHTML = `<div class="term-bar"><div class="term-dot" style="background:#f43f5e"></div><div class="term-dot" style="background:#f59e0b"></div><div class="term-dot" style="background:#22c55e"></div><span class="term-path">interactive@shell:~ $</span></div><div class="term-body" id="interactiveTermBody" style="min-height:200px"><div class="term-line">[>] Type 'help' to see available commands.</div><div class="term-line"><span class="tc-green">$></span> <span id="cmdLine"></span><span class="cursor" style="width:6px"></span></div></div>`;
const aboutSection = document.getElementById('about'); if(aboutSection) aboutSection.insertAdjacentElement('afterend', interactiveTerm);
let cmdHistory=[], histIdx=0; let currentInput='';
function addCommandOutput(cmd, output){ const body = document.getElementById('interactiveTermBody'); const line = document.createElement('div'); line.className = 'term-line'; line.innerHTML = `<span class="tc-green">user@sec:~$</span> ${cmd}<br><span class="tc-dim">> ${output}</span>`; body.insertBefore(line, body.lastElementChild); body.scrollTop = body.scrollHeight; }
const commandMap = { 'help': 'Available: help, skills, certifications, contact, clear', 'skills': '🔹 Microsoft Sentinel (90%) | MDE (88%) | KQL | Threat Hunting | MITRE ATT&CK', 'certifications': 'HTB CDSA, CAP, TryHackMe Jr PenTester', 'contact': 'Email: swethadevi1125@gmail.com | LinkedIn: /bonu-swetha-devi-sai-priya', 'clear': 'CLEAR' };
document.addEventListener('keydown', (e) => { const active = document.activeElement === document.body || document.activeElement === document.documentElement; if(!active) return; if(e.key.length===1 && /[a-zA-Z0-9 ]/.test(e.key)){ currentInput+=e.key; document.getElementById('cmdLine') && (document.getElementById('cmdLine').innerText = currentInput); } else if(e.key === 'Backspace'){ currentInput = currentInput.slice(0,-1); document.getElementById('cmdLine') && (document.getElementById('cmdLine').innerText = currentInput); } else if(e.key === 'Enter'){ const cmd = currentInput.trim().toLowerCase(); if(cmd === 'clear'){ document.getElementById('interactiveTermBody').innerHTML = '<div class="term-line">[>] Terminal cleared.</div><div class="term-line"><span class="tc-green">$></span> <span id="cmdLine"></span><span class="cursor" style="width:6px"></span></div>'; currentInput=''; } else { const output = commandMap[cmd] || 'Command not found. Try help.'; addCommandOutput(cmd, output); currentInput=''; } document.getElementById('cmdLine') && (document.getElementById('cmdLine').innerText = ''); e.preventDefault(); } else if(e.key === 'ArrowUp'){ if(cmdHistory.length){ currentInput = cmdHistory[cmdHistory.length-1]; document.getElementById('cmdLine') && (document.getElementById('cmdLine').innerText = currentInput); } } });
// 9. Reading time estimator on blog cards
function addReadingTime(){ document.querySelectorAll('.blog-card').forEach(card => { const excerpt = card.querySelector('.blog-excerpt')?.innerText || ''; const words = excerpt.split(/\s+/).length; const mins = Math.max(1, Math.ceil(words / 150)); const meta = card.querySelector('.blog-meta'); if(meta && !meta.querySelector('.read-time-badge')){ const badge = document.createElement('span'); badge.className = 'read-time-badge'; badge.innerHTML = `<i class="fas fa-hourglass-half"></i> ${mins} min read`; meta.appendChild(badge); } }); }
setTimeout(addReadingTime, 500);

const glow = document.getElementById('mouseGlow'); document.addEventListener('mousemove', (e) => { glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`; });

</script>
